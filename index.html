<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2A Agency | Global Brand Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FCFCFC; color: #050505; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .emerald-brand { color: #064e3b; }
        .drift-pulse { animation: pulse-red 2s infinite; background-color: rgba(220, 38, 38, 0.03); }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
        .sticky-btn { position: fixed; top: 2rem; right: 2rem; z-index: 100; }
    </style>
</head>
<body class="p-8 md:p-12">

    <div class="sticky-btn">
        <a href="index.html#audit-form" class="bg-[#064e3b] text-white text-[10px] font-black uppercase tracking-[0.2em] px-8 py-5 shadow-2xl hover:bg-black transition-all inline-block border border-white/10">
            Request Audit
        </a>
    </div>

    <nav class="flex justify-between items-center w-full max-w-7xl mx-auto mb-24">
        <a href="index.html" class="font-[900] tracking-[0.3em] text-[15px] uppercase text-[#064e3b]">2A Agency</a>
        <div class="hidden md:flex gap-10 text-[10px] uppercase tracking-widest font-bold items-center">
            <span class="emerald-brand underline underline-offset-8 decoration-2">Registry</span>
            <div class="px-2 py-0.5 border border-blue-600 text-blue-600 rounded text-[8px] font-black italic">ERC-8004 COMPLIANT</div>
            <a href="glossary.html" class="opacity-40 hover:opacity-100 transition">Glossary</a>
            <a href="whitepaper.html" class="opacity-40 hover:opacity-100 transition">Protocol</a>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto mb-16">
        <h1 class="text-6xl font-[900] tracking-tighter uppercase mb-4 leading-none">
            Global Integrity <br><span class="opacity-10">Registry</span>
        </h1>
        <div class="flex items-center gap-4">
            <p class="text-[10px] font-mono opacity-40 uppercase tracking-[0.4em]">102 Audited Entities // Machine-Readable Dataset</p>
            <div class="h-[1px] flex-1 bg-black/5"></div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div class="grid grid-cols-4 p-6 text-[9px] font-black uppercase tracking-[0.3em] opacity-30 border-b border-black/10">
            <div>Rank</div>
            <div>Brand Entity</div>
            <div>AI-IQ Score</div>
            <div class="text-right">Blockchain Notarization</div>
        </div>

        <div id="registry-list"></div>
    </main>

    <footer class="max-w-7xl mx-auto mt-32 pt-12 border-t border-black/5 flex justify-between items-center opacity-20">
        <div class="text-[9px] font-mono uppercase tracking-widest">© 2026 2A Agency // Unit 0x2A...8004</div>
        <div class="text-[9px] font-mono uppercase tracking-widest">Base L2 Settlement Active</div>
    </footer>

    <script src="database.js"></script>
    <script>
        const container = document.getElementById('registry-list');
        
        // TRI AUTOMATIQUE (Du meilleur au pire)
        const sorted = [...registryData].sort((a, b) => b.score - a.score);

        container.innerHTML = sorted.map((brand, index) => {
            // Détecter si la marque est en "Drift" (sous 50, comme Goyard)
            const isDrift = brand.score < 50;
            const rank = (index + 1).toString().padStart(3, '0');
            
            return `
                <div class="grid grid-cols-4 items-center p-8 border-b border-black/5 transition-colors hover:bg-black/[0.01] ${isDrift ? 'drift-pulse border-red-100' : ''}">
                    <div class="text-[11px] font-mono ${isDrift ? 'text-red-400' : 'opacity-20'}">#${rank}</div>
                    
                    <div class="text-sm font-black uppercase tracking-tight ${isDrift ? 'text-red-600' : 'text-[#064e3b]'}">
                        ${brand.name}
                        ${isDrift ? '<span class="ml-3 text-[8px] bg-red-600 text-white px-1.5 py-0.5 tracking-tighter">ALERT: DRIFT</span>' : ''}
                    </div>
                    
                    <div class="flex items-baseline gap-1">
                        <span class="text-xl font-[900] ${isDrift ? 'text-red-600' : ''}">${brand.score}</span>
                        <span class="text-[10px] opacity-20 font-bold">/100</span>
                    </div>
                    
                    <div class="flex justify-end">
                        <a href="https://basescan.org/search?q=${brand.hash}" target="_blank" 
                           class="text-[9px] font-mono px-4 py-2 rounded-none border transition-all ${isDrift ? 'border-red-600 text-red-600 font-bold' : 'border-black/10 opacity-40 hover:opacity-100 hover:border-black'}">
                            ${isDrift ? 'NON-COMPLIANT' : 'VERIFIED'}_${brand.hash.substring(0, 8).toUpperCase()}
                        </a>
                    </div>
                </div>
            `;
        }).join('');
    </script>
</body>
</html>
