<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2A Agency | Global Authority Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FFFFFF; color: #111111; }
        .status-verified { color: #16a34a; background-color: #f0fdf4; border: 1px solid #dcfce7; }
        .status-warning { color: #d97706; background-color: #fffbeb; border: 1px solid #fef3c7; }
        .status-critical { color: #dc2626; background-color: #fef2f2; border: 1px solid #fee2e2; }
    </style>
</head>
<body class="p-8 md:p-16">

    <div class="max-w-7xl mx-auto mb-20 flex justify-between items-end border-b border-gray-100 pb-10">
        <div>
            <h1 class="text-5xl font-extralight tracking-tighter text-black uppercase tracking-tighter">Global Authority <span class="font-bold">Index</span></h1>
            <p class="text-gray-400 mt-3 text-sm tracking-widest uppercase font-medium">Verified On-Chain Luxury Integrity Registry — 2026 Edition</p>
        </div>
        <div class="text-right">
            <div class="text-[10px] text-gray-400 uppercase tracking-[0.3em] mb-2 font-bold">Index Coverage</div>
            <div class="text-4xl font-bold text-black font-mono">100<span class="text-gray-200">/100</span></div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto mb-16">
        <input type="text" id="searchInput" onkeyup="searchRegistry()" placeholder="Rechercher une entité (ex: Gucci, Goyard...)" 
               class="w-full bg-white border-b-2 border-gray-100 py-6 text-2xl focus:outline-none focus:border-black transition-all font-light placeholder-gray-200">
    </div>

    <div class="max-w-7xl mx-auto overflow-x-auto">
        <table class="w-full text-left">
            <thead>
                <tr class="text-gray-400 text-[10px] uppercase tracking-[0.4em] border-b border-gray-50">
                    <th class="pb-8 font-semibold">Entity Name</th>
                    <th class="pb-8 font-semibold">Category</th>
                    <th class="pb-8 font-semibold text-center">Score</th>
                    <th class="pb-8 font-semibold text-right">Blockchain Proof</th>
                </tr>
            </thead>
            <tbody id="registryBody">
                </tbody>
        </table>
    </div>

    <script>
        function renderTable(data) {
            const body = document.getElementById('registryBody');
            body.innerHTML = '';
            
            data.forEach(item => {
                let statusClass = 'status-verified';
                let statusText = 'VERIFIED';
                let scoreColor = 'text-green-600';

                if (item.score < 60) {
                    statusClass = 'status-critical'; statusText = 'CRITICAL'; scoreColor = 'text-red-600';
                } else if (item.score < 80) {
                    statusClass = 'status-warning'; statusText = 'WARNING'; scoreColor = 'text-yellow-600';
                }

                body.innerHTML += `
                    <tr class="border-b border-gray-50 hover:bg-gray-50 transition-all">
                        <td class="py-12">
                            <span class="block text-2xl font-bold text-black tracking-tight">${item.name}</span>
                        </td>
                        <td class="py-12 text-gray-400 text-sm uppercase tracking-widest font-medium">
                            ${item.category || 'Luxury'}
                        </td>
                        <td class="py-12 text-center">
                            <span class="${scoreColor} font-mono font-bold text-3xl">${item.score}</span>
                            <span class="text-gray-200 text-xs">/100</span>
                        </td>
                        <td class="py-12 text-right">
                            <div class="flex flex-col items-end gap-3">
                                <span class="${statusClass} text-[9px] font-black tracking-[0.2em] px-4 py-1.5 rounded-full uppercase">
                                    ${statusText}
                                </span>
                                <a href="https://basescan.org/tx/${item.hash}" target="_blank" 
                                   class="text-[9px] text-gray-300 hover:text-black font-bold transition-colors uppercase tracking-widest border-b border-transparent hover:border-black">
                                   View On-Chain Proof ↗
                                </a>
                            </div>
                        </td>
                    </tr>`;
            });
        }

        function searchRegistry() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = registryData.filter(i => 
                i.name.toLowerCase().includes(val) || 
                i.category.toLowerCase().includes(val)
            );
            renderTable(filtered);
        }

        window.onload = () => { if (typeof registryData !== 'undefined') renderTable(registryData); };
    </script>
</body>
</html>
