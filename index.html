<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2A Agency | The System of Record</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FCFCFC; color: #050505; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        
        /* VERT ÉMERAUDE SIGNATURE */
        .emerald-brand { color: #064e3b; }
        
        /* LOGO TECHNIQUE (900 BLACK) */
        .logo-bold { font-weight: 900; letter-spacing: 0.3em; font-size: 15px; text-transform: uppercase; color: #064e3b; }
        
        /* BOUTON IMPACT */
        .btn-emerald { background-color: #064e3b; color: #FCFCFC; transition: all 0.3s ease; border: 1px solid #064e3b; }
        .btn-emerald:hover { background-color: #050505; color: white; transform: scale(1.02); }
        .btn-emerald:disabled { opacity: 0.6; cursor: not-allowed; }

        input { border: 1px solid rgba(0,0,0,0.1); background-color: white; color: #050505; text-align: center; }
        input:focus { border-color: #064e3b; outline: none; }
        ::placeholder { color: rgba(0,0,0,0.2); font-size: 9px; letter-spacing: 0.2em; font-weight: 700; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-8 md:p-12">

    <nav class="flex justify-between items-center w-full max-w-7xl mx-auto">
        <div class="logo-bold">2A Agency</div>
        <div class="hidden md:flex gap-10 text-[10px] uppercase tracking-widest font-bold">
            <a href="registry.html" class="emerald-brand underline underline-offset-8 decoration-2">Registry</a>
            <a href="glossary.html" class="opacity-40 hover:opacity-100 transition">Glossary</a>
            <a href="whitepaper.html" class="opacity-40 hover:opacity-100 transition">Protocol</a>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto text-center flex flex-col items-center mt-28">
        <h1 class="text-6xl md:text-9xl font-[900] tracking-tighter leading-[0.85] mb-8 uppercase emerald-brand">
            Certainty <br>
            <span class="text-black/10">is the</span> <br>
            new moat.
        </h1>
        
        <p class="text-lg md:text-xl text-black/50 max-w-2xl leading-relaxed mt-10 mb-16 italic font-medium">
            The System of Record for the generative age. <br>
            We notarize brand truth <span class="emerald-brand font-bold uppercase tracking-widest text-sm">on-chain</span> to end AI hallucinations.
        </p>

        <form id="audit-form" action="https://formspree.io/f/xykngdbz" method="POST" class="flex flex-col gap-4 w-full max-w-sm">
            <input type="text" name="brand" placeholder="BRAND / ENTITY" required class="px-6 py-5 text-[10px] font-bold uppercase tracking-widest rounded-none">
            <input type="email" name="email" placeholder="OFFICIAL EMAIL" required class="px-6 py-5 text-[10px] font-bold uppercase tracking-widest rounded-none">
            
            <button type="submit" id="submit-btn" class="btn-emerald px-8 py-5 text-[11px] font-black uppercase tracking-[0.3em] rounded-none mt-2 shadow-lg">
                Request Audit
            </button>
        </form>
    </main>

    <footer class="w-full max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-end md:items-center gap-8 border-t border-black/5 pt-10">
        <div class="flex flex-col gap-1 text-left">
            <span class="text-[9px] uppercase tracking-widest opacity-40 font-bold">Network Status</span>
            <div class="flex items-center gap-2">
                <div class="w-1.5 h-1.5 rounded-full bg-[#064e3b] animate-pulse"></div>
                <span class="text-[9px] font-mono opacity-60 tracking-tighter font-bold uppercase tracking-[0.1em]">BASE_L2_ANCHOR_ACTIVE</span>
            </div>
        </div>
        <div class="text-[9px] uppercase tracking-[0.4em] opacity-20 font-bold text-right italic text-black">
            © 2026 2A Agency | Forensic Intelligence Unit
        </div>
    </footer>

    <script>
        const form = document.getElementById("audit-form");
        const button = document.getElementById("submit-btn");

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            button.disabled = true;
            button.innerHTML = `<span class="animate-pulse">NOTARIZING...</span>`;
            const data = new FormData(event.target);
            try {
                const response = await fetch(event.target.action, {
                    method: form.method,
                    body: data,
                    headers: { 'Accept': 'application/json' }
                });
                if (response.ok) { window.location.href = "thanks.html"; } 
                else { alert("Error."); button.disabled = false; button.innerText = "REQUEST AUDIT"; }
            } catch (error) { button.disabled = false; button.innerText = "REQUEST AUDIT"; }
        });
    </script>
</body>
</html>
