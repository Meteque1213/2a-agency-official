<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2A Agency | Global Authority Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FFFFFF; color: #111111; }
        .status-verified { color: #16a34a; background-color: #f0fdf4; }
        .status-warning { color: #d97706; background-color: #fffbeb; }
        .status-critical { color: #dc2626; background-color: #fef2f2; }
    </style>
</head>
<body class="p-8 md:p-12">

    <div class="max-w-7xl mx-auto mb-16 flex justify-between items-end border-b border-gray-100 pb-8">
        <div>
            <h1 class="text-4xl font-extralight tracking-tighter text-black uppercase">Global Authority <span class="font-bold">Index</span></h1>
            <p class="text-gray-500 mt-2 text-sm">Verified On-Chain Luxury Integrity Registry — 2026 Edition</p>
        </div>
        <div class="text-right">
            <div class="text-xs text-gray-400 uppercase tracking-widest mb-1 font-semibold">Index Coverage</div>
            <div class="text-3xl font-bold text-black font-mono" id="coverageCount">100<span class="text-gray-200">/100</span></div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto mb-12">
        <input type="text" id="searchInput" onkeyup="searchRegistry()" placeholder="Rechercher une marque ou une catégorie..." 
               class="w-full bg-gray-50 border border-gray-200 rounded-xl px-6 py-4 text-lg focus:outline-none focus:border-black transition-all font-light shadow-sm">
    </div>

    <div class="max-w-7xl mx-auto overflow-x-auto">
        <table class="w-full text-left">
            <thead>
                <tr class="text-gray-400 text-xs uppercase tracking-[0.2em] border-b border-gray-100">
                    <th class="pb-6 font-semibold">Entity Name</th>
                    <th class="pb-6 font-semibold">Category</th>
                    <th class="pb-6 font-semibold text-center">AI-IQ Score</th>
                    <th class="pb-6 font-semibold text-right">Audit Status</th>
                </tr>
            </thead>
            <tbody id="registryBody">
                </tbody>
        </table>
    </div>

    <script>
        // Fonction pour afficher les données
        function renderTable(data) {
            const body = document.getElementById('registryBody');
            body.innerHTML = '';
            
            // Si database.js n'est pas encore chargé ou vide
            if (!data || data.length === 0) {
                body.innerHTML = '<tr><td colspan="4" class="py-10 text-center text-gray-400 font-light italic">En attente de synchronisation blockchain...</td></tr>';
                return;
            }

            // Mise à jour du compteur de couverture
            document.getElementById('coverageCount').innerHTML = `${data.length}<span class="text-gray-200">/100</span>`;

            data.forEach(item => {
                let statusClass = 'status-verified';
                let statusText = 'VERIFIED';
                let scoreColor = 'text-green-600';

                if (item.score < 60) {
                    statusClass = 'status-critical';
                    statusText = 'CRITICAL';
                    scoreColor = 'text-red-600';
                } else if (item.score < 80) {
                    statusClass = 'status-warning';
                    statusText = 'WARNING';
                    scoreColor = 'text-yellow-600';
                }

                body.innerHTML += `
                    <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors group">
                        <td class="py-6 font-bold text-black text-lg">${item.name}</td>
                        <td class="py-6 text-gray-500 text-sm tracking-wide font-light">${item.category}</td>
                        <td class="py-6 text-center">
                            <span class="${scoreColor} font-mono font-bold text-2xl">${item.score}</span>
                            <span class="text-gray-200 text-xs">/100</span>
                        </td>
                        <td class="py-6 text-right">
                            <div class="flex flex-col items-end gap-2">
                                <span class="${statusClass} text-[10px] font-bold tracking-widest px-3 py-1 rounded-full">
                                    ${statusText}
                                </span>
                                <a href="https://basescan.org/tx/${item.hash}" target="_blank" 
                                   class="text-[9px] text-gray-300 hover:text-black font-mono transition-colors uppercase tracking-tighter">
                                   View Proof ↗
                                </a>
                            </div>
                        </td>
                    </tr>`;
            });
        }

        // Fonction de recherche
        function searchRegistry() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = registryData.filter(i => 
                i.name.toLowerCase().includes(val) || 
                i.category.toLowerCase().includes(val)
            );
            renderTable(filtered);
        }

        // Lancement initial (on utilise registryData défini dans database.js)
        window.onload = () => {
            if (typeof registryData !== 'undefined') {
                renderTable(registryData);
            } else {
                renderTable([]);
            }
        };
    </script>
</body>
</html>
