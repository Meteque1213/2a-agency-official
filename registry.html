<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Authority Index | 2A Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fff; color: #000; }
        .kern { letter-spacing: 0.2em; }
    </style>
</head>
<body class="p-12">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-end border-b border-black pb-8 mb-16">
            <div>
                <a href="index.html" class="text-[10px] uppercase kern text-gray-400 hover:text-black mb-4 block">← Return to Authority</a>
                <h1 class="text-5xl font-black uppercase tracking-tighter">Global Authority <span class="font-light italic text-gray-400">Index</span></h1>
            </div>
            <div class="text-right font-mono text-3xl font-bold">100<span class="text-gray-200">/100</span></div>
        </div>

        <table class="w-full text-left">
            <thead>
                <tr class="text-[10px] uppercase kern text-gray-400 border-b border-gray-100">
                    <th class="pb-6">Entity</th>
                    <th class="pb-6 text-center">Score</th>
                    <th class="pb-6 text-right">Blockchain Certification</th>
                </tr>
            </thead>
            <tbody id="registryBody"></tbody>
        </table>
    </div>

    <script>
        function renderTable() {
            const body = document.getElementById('registryBody');
            // TRI : De la meilleure note à la moins bonne
            const sortedData = registryData.sort((a, b) => b.score - a.score);

            body.innerHTML = sortedData.map(item => `
                <tr class="border-b border-gray-50 hover:bg-gray-50 transition-all group">
                    <td class="py-10">
                        <span class="block text-xl font-bold tracking-tight">${item.name}</span>
                        <span class="text-[9px] uppercase kern text-gray-400">${item.category || 'Luxury'}</span>
                    </td>
                    <td class="py-10 text-center font-mono text-3xl font-bold">
                        <span class="${item.score > 80 ? 'text-black' : (item.score > 60 ? 'text-gray-400' : 'text-red-600')}">
                            ${item.score}
                        </span>
                    </td>
                    <td class="py-10 text-right">
                        <div class="flex flex-col items-end">
                            <span class="text-[9px] font-bold uppercase kern px-3 py-1 bg-black text-white mb-2">Verified</span>
                            <a href="https://basescan.org/tx/${item.hash}" target="_blank" class="text-[8px] text-gray-300 hover:text-black font-mono">HASH: ${item.hash.substring(0,12)}... ↗</a>
                        </div>
                    </td>
                </tr>
            `).join('');
        }
        window.onload = renderTable;
    </script>
</body>
</html>
