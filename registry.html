<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Authority Index | 2A Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FFF; color: #111; }
        .tracking-audit { letter-spacing: 0.3em; }
        .text-emerald { color: #064e3b; }
        .text-amber { color: #b45309; }
        .text-crimson { color: #991b1b; }
        /* Style pour la barre de recherche */
        #searchInput::placeholder { color: #e5e7eb; font-weight: 300; }
    </style>
</head>
<body class="p-12 md:p-24">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-end border-b border-gray-100 pb-12 mb-12">
            <div>
                <a href="index.html" class="text-[10px] uppercase tracking-audit text-gray-400 hover:text-black mb-10 block font-bold transition-all italic underline">← System Home</a>
                <h1 class="text-5xl font-light uppercase tracking-tighter text-emerald">Global Authority <span class="italic font-extralight text-gray-200">Index</span></h1>
            </div>
            <div class="text-right">
                <span class="text-[9px] uppercase tracking-audit text-gray-300 block mb-2 font-bold italic text-emerald underline">Autonomous Feed</span>
                <span class="font-mono text-2xl font-light text-gray-100 tracking-widest uppercase italic">Live Audit List</span>
            </div>
        </div>

        <div class="mb-16">
            <input type="text" id="searchInput" onkeyup="searchRegistry()" placeholder="SEARCH ENTITY OR SECTOR..." 
                   class="w-full bg-white border-b-2 border-gray-100 py-6 text-3xl font-light focus:outline-none focus:border-emerald transition-all tracking-tighter uppercase">
        </div>

        <table class="w-full text-left">
            <thead>
                <tr class="text-[10px] uppercase tracking-audit text-gray-400 border-b border-gray-100">
                    <th class="pb-8 font-semibold">Audited Entity</th>
                    <th class="pb-8 text-center font-semibold">Integrity Score</th>
                    <th class="pb-8 text-right font-semibold">On-Chain Proof</th>
                </tr>
            </thead>
            <tbody id="registryBody"></tbody>
        </table>
    </div>

    <script>
        // Fonction de rendu du tableau
        function renderTable(data) {
            const body = document.getElementById('registryBody');
            body.innerHTML = ''; // Clear previous results

            // Tri par score (Meilleur en haut)
            const sortedData = data.sort((a, b) => b.score - a.score);

            body.innerHTML = sortedData.map(item => {
                let colorClass = "text-emerald"; 
                if (item.score < 50) colorClass = "text-crimson";
                else if (item.score < 80) colorClass = "text-amber";

                return `
                <tr class="border-b border-gray-50 hover:bg-gray-50 transition-all duration-300">
                    <td class="py-8">
                        <span class="block text-2xl font-normal tracking-tight ${colorClass} uppercase">${item.name}</span>
                        <span class="text-[10px] uppercase tracking-widest text-gray-400 font-bold italic">${item.category}</span>
                    </td>
                    <td class="py-8 text-center">
                        <span class="font-mono text-3xl ${colorClass} font-light">${item.score}</span>
                        <span class="text-[10px] text-gray-200 ml-1">/100</span>
                    </td>
                    <td class="py-8 text-right">
                        <div class="flex flex-col items-end">
                            <a href="https://basescan.org/tx/${item.hash}" target="_blank" class="text-[8px] uppercase tracking-audit text-gray-300 hover:text-emerald transition-colors font-bold font-mono">Verify Proof ↗</a>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        // Fonction de recherche
        function searchRegistry() {
            const input = document.getElementById('searchInput');
            const filter = input.value.toLowerCase();
            
            // Filtrage sur le Nom OU la Catégorie
            const filteredData = registryData.filter(item => 
                item.name.toLowerCase().includes(filter) || 
                item.category.toLowerCase().includes(filter)
            );
            
            renderTable(filteredData);
        }

        // Chargement initial
        window.onload = () => {
            renderTable(registryData);
        };
    </script>
</body>
</html>
