<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Authority Index | 2A Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FFF; color: #111; }
        .tracking-audit { letter-spacing: 0.3em; }
        .text-emerald { color: #064e3b; }
        .text-amber { color: #b45309; }
        .text-crimson { color: #991b1b; }
    </style>
</head>
<body class="p-12 md:p-24">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-end border-b border-gray-100 pb-12 mb-20">
            <div>
                <a href="index.html" class="text-[9px] uppercase tracking-audit text-gray-400 hover:text-black mb-10 block transition-colors">← System Home</a>
                <h1 class="text-5xl font-light uppercase tracking-tighter text-emerald">Global Authority <span class="italic font-extralight text-gray-200">Index</span></h1>
            </div>
            <div class="text-right">
                <span class="text-[9px] uppercase tracking-audit text-gray-300 block mb-2 font-bold italic text-emerald underline">Live Infrastructure</span>
                <span class="font-mono text-2xl font-light text-gray-100 uppercase tracking-widest">100 Assets Audited</span>
            </div>
        </div>

        <table class="w-full text-left">
            <thead>
                <tr class="text-[9px] uppercase tracking-audit text-gray-400 border-b border-gray-100">
                    <th class="pb-8 font-semibold">Luxury Entity</th>
                    <th class="pb-8 text-center font-semibold">Integrity Score</th>
                    <th class="pb-8 text-right font-semibold">Blockchain Proof</th>
                </tr>
            </thead>
            <tbody id="registryBody"></tbody>
        </table>
    </div>

    <script>
        function renderTable() {
            const body = document.getElementById('registryBody');
            const sortedData = registryData.sort((a, b) => b.score - a.score);

            body.innerHTML = sortedData.map(item => {
                let colorClass = "text-emerald"; 
                if (item.score < 50) colorClass = "text-crimson";
                else if (item.score < 80) colorClass = "text-amber";

                return `
                <tr class="border-b border-gray-50 hover:bg-gray-50 transition-all duration-300">
                    <td class="py-10">
                        <span class="block text-xl font-normal tracking-tight ${colorClass} uppercase">${item.name}</span>
                        <span class="text-[8px] uppercase tracking-widest text-gray-300 font-bold">${item.category || 'Luxury Sector'}</span>
                    </td>
                    <td class="py-10 text-center">
                        <span class="font-mono text-2xl ${colorClass} font-light">${item.score}</span>
                        <span class="text-[8px] text-gray-200 ml-1">/100</span>
                    </td>
                    <td class="py-10 text-right">
                        <div class="flex flex-col items-end">
                            <a href="https://basescan.org/tx/${item.hash}" target="_blank" 
                               class="text-[8px] uppercase tracking-audit text-gray-300 hover:text-emerald transition-colors font-bold">
                               Verify Ledger ↗
                            </a>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }
        window.onload = renderTable;
    </script>
</body>
</html>
