<script src="database.js"></script>
<script>
    const tableBody = document.getElementById('registry-body');
    const searchInput = document.getElementById('search-input');

    function renderTable(data) {
        tableBody.innerHTML = '';
        data.forEach(item => {
            // Logique de couleur pour le score
            let colorClass = 'text-emerald'; // Vert (Top)
            if (item.score < 80) colorClass = 'text-amber-500'; // Orange (Warning)
            if (item.score < 60) colorClass = 'text-red-500'; // Rouge (Critical)

            const row = `
                <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors group">
                    <td class="py-6 px-4">
                        <div class="text-sm font-semibold uppercase tracking-tighter">${item.name}</div>
                        <div class="text-[9px] text-gray-400 uppercase tracking-widest">${item.category}</div>
                    </td>
                    <td class="py-6 px-4">
                        <div class="text-lg font-mono ${colorClass} font-bold">${item.score}</div>
                    </td>
                    <td class="py-6 px-4">
                        <div class="text-xs font-mono text-gray-500">${item.moatDelta}</div>
                    </td>
                    <td class="py-6 px-4">
                        <div class="flex items-center gap-3">
                            <div class="text-[10px] font-mono text-gray-300 truncate w-24">${item.hash}</div>
                            <a href="https://basescan.org/search?q=${item.hash}" target="_blank" 
                               class="text-[9px] uppercase tracking-widest font-black border border-black px-3 py-1 hover:bg-black hover:text-white transition-all">
                                Verify Proof
                            </a>
                        </div>
                    </td>
                </tr>
            `;
            tableBody.innerHTML += row;
        });
    }

    // Initial Render
    renderTable(registryData);

    // Search Logic
    searchInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = registryData.filter(item => 
            item.name.toLowerCase().includes(term) || 
            item.category.toLowerCase().includes(term)
        );
        renderTable(filtered);
    });
</script>
