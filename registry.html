<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Registry | 2A Agency</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FCFCFC; color: #050505; font-family: 'Inter', sans-serif; }
        .emerald-text { color: #064e3b; }
        .score-pill { font-weight: 900; padding: 4px 12px; border-radius: 2px; border: 1px solid; font-size: 1.1rem; }
        .high { color: #064e3b; background-color: #f0fdf4; border-color: #dcfce7; }
        .mid { color: #b45309; background-color: #fffbeb; border-color: #fef3c7; }
        .low { color: #b91c1c; background-color: #fef2f2; border-color: #fee2e2; }
    </style>
</head>
<body class="min-h-screen p-8 md:p-12">
    <nav class="flex justify-between items-center w-full max-w-7xl mx-auto mb-16">
        <a href="index.html" class="text-[12px] tracking-[0.5em] font-black uppercase emerald-text">2A Agency</a>
        <div class="text-[9px] uppercase tracking-widest font-bold opacity-40">System of Record v1.0</div>
    </nav>

    <main class="max-w-7xl mx-auto">
        <header class="mb-12">
            <h1 class="text-4xl font-black tracking-tighter uppercase emerald-text mb-2">Global Registry</h1>
            <p class="text-xs font-bold opacity-30 uppercase tracking-[0.3em]">102 Audited Entities | Machine-Readable Dataset</p>
        </header>

        <div class="overflow-x-auto border-t border-black/10">
            <table class="w-full text-left border-collapse" itemscope itemtype="https://schema.org/Dataset">
                <thead>
                    <tr class="text-[10px] uppercase tracking-widest opacity-40 border-b border-black/5">
                        <th class="px-6 py-8">Rank</th>
                        <th class="px-6 py-8">Entity</th>
                        <th class="px-6 py-8">AI-IQ Score</th>
                        <th class="px-6 py-8 text-right">Blockchain Notarization</th>
                    </tr>
                </thead>
                <tbody id="registry-body">
                    <tr class="border-b border-black/5" itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
                        <td class="px-6 py-6 text-black/20 font-mono text-xs">#001</td>
                        <td class="px-6 py-6 font-black emerald-text text-sm uppercase">
                            <span itemprop="name">Hermès</span>
                        </td>
                        <td class="px-6 py-6">
                            <span class="score-pill high" data-score="98">98</span>
                            <meta itemprop="position" content="1">
                        </td>
                        <td class="px-6 py-6 text-right font-mono text-[9px] opacity-40">0xH3RM3S_BASE_L2</td>
                    </tr>

                    <tr class="border-b border-black/5">
                        <td class="px-6 py-6 text-black/20 font-mono text-xs">#002</td>
                        <td class="px-6 py-6 font-black emerald-text text-sm uppercase">Patek Philippe</td>
                        <td class="px-6 py-6"><span class="score-pill high">97</span></td>
                        <td class="px-6 py-6 text-right font-mono text-[9px] opacity-40">0xP4T3K_BASE_L2</td>
                    </tr>

                    <tr class="border-b border-black/5">
                        <td class="px-6 py-6 text-black/20 font-mono text-xs">#007</td>
                        <td class="px-6 py-6 font-black emerald-text text-sm uppercase">Rolex</td>
                        <td class="px-6 py-6"><span class="score-pill high">93</span></td>
                        <td class="px-6 py-6 text-right font-mono text-[9px] opacity-40">0xR0L3X_BASE_L2</td>
                    </tr>

                    <tr class="border-b border-black/5 bg-red-50" itemprop="itemListElement" itemscope itemtype="https://schema.org/ListItem">
                        <td class="px-6 py-6 text-red-600 font-mono text-xs font-bold">#101</td>
                        <td class="px-6 py-6 font-black text-red-700 text-sm uppercase">
                            <span itemprop="name">Goyard</span>
                        </td>
                        <td class="px-6 py-6">
                            <span class="score-pill low" data-score="46">46</span>
                            <meta itemprop="position" content="101">
                        </td>
                        <td class="px-6 py-6 text-right font-mono text-[10px] text-red-700 font-bold uppercase underline">
                            CRITICAL_DRIFT_0x9F1A
                        </td>
                    </tr>

                    </tbody>
            </table>
        </div>
    </main>

    <script src="database.js"></script>
    <script>
        const body = document.getElementById('registry-body');
        const staticBrands = ["Hermès", "Patek Philippe", "Rolex", "Goyard"];
        
        // Tri et filtrage
        const dynamicData = [...registryData]
            .filter(b => !staticBrands.includes(b.name))
            .sort((a, b) => b.score - a.score);

        dynamicData.forEach((brand) => {
            const displayRank = registryData.findIndex(b => b.name === brand.name) + 1;
            const rank = displayRank.toString().padStart(3, '0');
            const scoreClass = brand.score >= 80 ? 'high' : (brand.score >= 50 ? 'mid' : 'low');
            
            body.innerHTML += `
                <tr class="border-b border-black/5 hover:bg-gray-50 transition">
                    <td class="px-6 py-6 text-black/20 font-mono text-xs">#${rank}</td>
                    <td class="px-6 py-6 font-black emerald-text text-sm uppercase">${brand.name}</td>
                    <td class="px-6 py-6"><span class="score-pill ${scoreClass}">${brand.score}</span></td>
                    <td class="px-6 py-6 text-right font-mono text-[9px] opacity-40">ID_${brand.hash.substring(2, 8)}</td>
                </tr>`;
        });
    </script>
</body>
</html>
