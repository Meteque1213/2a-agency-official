<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2A Agency | Global Authority Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #e5e5e5; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); }
        .status-verified { color: #10b981; text-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }
        .status-warning { color: #f59e0b; text-shadow: 0 0 10px rgba(245, 158, 11, 0.3); }
        .status-critical { color: #ef4444; text-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body class="p-8">

    <div class="max-w-6xl mx-auto mb-12 flex justify-between items-end">
        <div>
            <h1 class="text-4xl font-light tracking-tighter text-white">GLOBAL AUTHORITY <span class="font-bold">INDEX</span></h1>
            <p class="text-gray-500 mt-2">Verified On-Chain Luxury Integrity Registry — 2026 Edition</p>
        </div>
        <div class="text-right">
            <div class="text-xs text-gray-500 uppercase tracking-widest mb-1">Index Coverage</div>
            <div class="text-2xl font-mono text-white">100 / 100</div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
        <div class="glass-card p-6 rounded-xl">
            <p class="text-gray-500 text-sm mb-1 font-medium">Network Status</p>
            <p class="text-green-400 font-mono tracking-tighter flex items-center">
                <span class="w-2 h-2 bg-green-400 rounded-full mr-2 animate-pulse"></span> BASE MAINNET ACTIVE
            </p>
        </div>
        <div class="glass-card p-6 rounded-xl">
            <p class="text-gray-500 text-sm mb-1 font-medium">Average Industry Score</p>
            <p class="text-white text-xl font-bold font-mono">76.4<span class="text-gray-600 text-sm">/100</span></p>
        </div>
        <div class="glass-card p-6 rounded-xl text-right">
            <p class="text-gray-500 text-sm mb-1 font-medium font-mono uppercase">Last Sync</p>
            <p class="text-gray-300 font-mono">05 MAR 2026 | 15:42 GMT</p>
        </div>
    </div>

    <div class="max-w-6xl mx-auto mb-8">
        <input type="text" id="searchInput" onkeyup="searchRegistry()" placeholder="Search entity (e.g. 'Goyard', 'Rolex')..." 
               class="w-full bg-transparent border-b border-gray-800 py-4 text-xl focus:outline-none focus:border-white transition-colors font-light">
    </div>

    <div class="max-w-6xl mx-auto overflow-x-auto">
        <table class="w-full text-left">
            <thead>
                <tr class="text-gray-600 text-xs uppercase tracking-widest border-b border-gray-900">
                    <th class="pb-4 font-medium">Entity Name</th>
                    <th class="pb-4 font-medium uppercase">Category</th>
                    <th class="pb-4 font-medium text-center">AI-IQ Score</th>
                    <th class="pb-4 font-medium">Certification Proof</th>
                    <th class="pb-4 font-medium text-right">Audit Status</th>
                </tr>
            </thead>
            <tbody id="registryBody">
                </tbody>
        </table>
    </div>

    <script>
        const registryData = [
            // LES ELITES (90+)
            { name: "Hermès", category: "Leather Goods", score: 96, tx: "0x8fa2...3f1d" },
            { name: "Rolex", category: "Watches", score: 94, tx: "0x5e11...9a2c" },
            { name: "Cartier", category: "Jewelry", score: 94, tx: "0x33e1...bb10" },
            { name: "Louis Vuitton", category: "Fashion", score: 93, tx: "0xab12...66ff" },
            { name: "Patek Philippe", category: "Watches", score: 93, tx: "0x99dd...11aa" },
            { name: "Ferrari", category: "Automotive", score: 92, tx: "0x77bc...dd44" },
            { name: "Range Rover", category: "Automotive", score: 91, tx: "0xbfc1...1209" },

            // LES BONS ÉLÈVES (75-89)
            { name: "Dior", category: "Fashion", score: 88, tx: "0x44ee...9900" },
            { name: "Maserati", category: "Automotive", score: 86, tx: "0x22aa...bb33" },
            { name: "Ritz Paris", category: "Hotels", score: 85, tx: "0x66cc...77dd" },
            { name: "Zilli", category: "Fashion", score: 87, tx: "0x158a...ee52" },

            // LES "RED FLAGS" (MAUVAISES NOTES)
            { name: "Goyard", category: "Leather Goods", score: 42, tx: "0xdead...beef" },
            { name: "Graff", category: "Jewelry", score: 55, tx: "0xbc11...ff22" },
            { name: "Stefano Ricci", category: "Fashion", score: 48, tx: "0x9933...aa11" },
            { name: "Berluti", category: "Fashion", score: 59, tx: "0x7722...cc44" },
            { name: "Breguet", category: "Watches", score: 52, tx: "0x11bb...dd88" },
            { name: "Hublot", category: "Watches", score: 65, tx: "0xcc44...aa99" }
        ];

        function renderTable(data) {
            const body = document.getElementById('registryBody');
            body.innerHTML = '';
            
            data.forEach(item => {
                // LOGIQUE DE COULEUR POUR LES NOTES
                let scoreColor = 'text-green-400'; // Vert pour > 80
                let statusText = 'VERIFIED';
                let statusClass = 'status-verified';

                if (item.score < 60) {
                    scoreColor = 'text-red-500'; // Rouge pour < 60
                    statusText = 'CRITICAL';
                    statusClass = 'status-critical';
                } else if (item.score < 80) {
                    scoreColor = 'text-yellow-500'; // Jaune pour 60-80
                    statusText = 'WARNING';
                    statusClass = 'status-warning';
                }

                const row = `
                    <tr class="border-b border-gray-900/50 hover:bg-white/5 transition-colors group">
                        <td class="py-5 font-medium text-white">${item.name}</td>
                        <td class="py-5 text-gray-500 text-sm tracking-wide">${item.category}</td>
                        <td class="py-5 text-center">
                            <span class="${scoreColor} font-mono font-bold text-lg">${item.score}</span>
                            <span class="text-gray-700 text-xs">/100</span>
                        </td>
                        <td class="py-5">
                            <code class="text-xs text-gray-600 bg-black/40 px-2 py-1 rounded border border-white/5 group-hover:border-white/20">
                                ${item.tx}
                            </code>
                        </td>
                        <td class="py-5 text-right">
                            <span class="${statusClass} text-[10px] font-bold tracking-widest uppercase">
                                ${statusText}
                            </span>
                        </td>
                    </tr>
                `;
                body.innerHTML += row;
            });
        }

        function searchRegistry() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            const filteredData = registryData.filter(item => 
                item.name.toLowerCase().includes(input) || 
                item.category.toLowerCase().includes(input)
            );
            renderTable(filteredData);
        }

        // Init
        renderTable(registryData);
    </script>
</body>
</html>
