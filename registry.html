<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2A Agency | Global Authority Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #FFFFFF; color: #111111; }
    </style>
</head>
<body class="p-8 md:p-12">

    <div class="max-w-7xl mx-auto mb-16 flex justify-between items-end border-b border-gray-100 pb-8">
        <div>
            <h1 class="text-4xl font-extralight tracking-tighter text-black uppercase">Global Authority <span class="font-bold">Index</span></h1>
            <p class="text-gray-500 mt-2 text-sm">Verified On-Chain Luxury Integrity Registry — 2026 Edition</p>
        </div>
        <div class="text-right">
            <div class="text-xs text-gray-400 uppercase tracking-widest mb-1 font-semibold">Index Coverage</div>
            <div class="text-3xl font-bold text-black font-mono">100<span class="text-gray-200">/100</span></div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto mb-12">
        <input type="text" id="searchInput" onkeyup="searchRegistry()" placeholder="Rechercher une marque (ex: 'Goyard', 'Patek')..." 
               class="w-full bg-gray-50 border border-gray-200 rounded-xl px-6 py-4 text-lg focus:outline-none focus:border-black transition-all font-light shadow-sm">
    </div>

    <div class="max-w-7xl mx-auto overflow-x-auto">
        <table class="w-full text-left">
            <thead>
                <tr class="text-gray-400 text-xs uppercase tracking-[0.2em] border-b border-gray-100">
                    <th class="pb-6 font-semibold">Entity Name</th>
                    <th class="pb-6 font-semibold">Category</th>
                    <th class="pb-6 font-semibold text-center">AI-IQ Score</th>
                    <th class="pb-6 font-semibold text-right">Audit Status</th>
                </tr>
            </thead>
            <tbody id="registryBody">
                </tbody>
        </table>
    </div>

    <script>
        const registryData = [
            // ELITES
            { name: "Patek Philippe", category: "Watches", score: 95, hash: "0xe149faa37a3c578181787dd8f39f15f25bf845bec4aa5cbee31e15db794e3f4a" },
            { name: "Hermès", category: "Leather Goods", score: 96, hash: "0x8fa2...3f1d" },
            { name: "Rolex", category: "Watches", score: 94, hash: "0x5e11...9a2c" },
            
            // MOYENS
            { name: "Macallan", category: "Spirits", score: 91, hash: "0xd76d1193256ba13c783c4f74c7eb82f8c20a38ec99d786066fe12128ee7477b" },
            { name: "NetJets", category: "Aviation", score: 82, hash: "0xcc66004ab487ea2b4a4e873d7857073ecdf12232e204aa07e2bd3ab8864c7aa2" },
            { name: "Lürssen Yachts", category: "Yachting", score: 85, hash: "0x3f436afea2d17b1c8605512433cebdd73340fd5ff2786d54b8fd27347cf" },

            // RED FLAGS (ROUGE)
            { name: "Goyard", category: "Leather Goods", score: 42, hash: "0x5f1fc429584d44525f4bba661eaad8f61e89b5ad9a4f79ef59ce397cac1fe967" },
            { name: "Stefano Ricci", category: "Fashion", score: 47, hash: "0x26d47c243e13379e440aa6c02476b59f363131b29e767ce546e65656aed16b45" },
            { name: "Graff", category: "Jewelry", score: 54, hash: "0x86c99da8a4779196783ee4b250349d797ad93fb5ebaf66374e7631c5fbc1c5e6" },
            { name: "Brioni", category: "Fashion", score: 58, hash: "0x4b688f3476cb7d28c33efdabaf3cd595d0261bcc6997352c6a7b38ebcf9dc47" }
        ];

        function renderTable(data) {
            const body = document.getElementById('registryBody');
            body.innerHTML = '';
            data.forEach(item => {
                const color = item.score > 80 ? 'text-green-600' : (item.score > 60 ? 'text-yellow-600' : 'text-red-600');
                const status = item.score > 80 ? 'VERIFIED' : (item.score > 60 ? 'WARNING' : 'CRITICAL');
                
                body.innerHTML += `
                    <tr class="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                        <td class="py-6 font-bold text-black">${item.name}</td>
                        <td class="py-6 text-gray-500 text-sm tracking-wide">${item.category}</td>
                        <td class="py-6 text-center">
                            <span class="${color} font-mono font-bold text-xl">${item.score}</span>
                            <span class="text-gray-300 text-xs">/100</span>
                        </td>
                        <td class="py-6 text-right">
                            <a href="https://basescan.org/tx/${item.hash}" target="_blank" 
                               class="text-[10px] font-bold tracking-widest border border-gray-200 px-3 py-1 rounded-full hover:bg-black hover:text-white transition-all">
                               VIEW PROOF
                            </a>
                        </td>
                    </tr>`;
            });
        }

        function searchRegistry() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            renderTable(registryData.filter(i => i.name.toLowerCase().includes(val)));
        }

        renderTable(registryData);
    </script>
</body>
</html>
